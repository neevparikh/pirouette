<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>pirouette</title>
    <!-- All third-party browser deps are self-hosted under vendor/ so
         the dashboard doesn't depend on CDN reachability or integrity
         at runtime. See scripts/post-build.mjs and vendor/README.md
         for the build / vendoring steps. -->
    <script src="vendor/tailwindcss.min.js"></script>
    <script src="vendor/marked.min.js"></script>
    <script src="vendor/marked-highlight.umd.js"></script>
    <script src="vendor/purify.min.js"></script>
    <!-- highlight.js bundled (with esbuild) from highlight.js/lib/common.js,
         which covers ~36 popular languages. Matches pi-coding-agent's
         markdown renderer setup (auto-detect off; explicit-language only). -->
    <script src="vendor/highlight.umd.js"></script>

    <!-- Font stack matches neevparikh.github.io:
           body   — Roboto Slab (variable serif)
           display— Zilla Slab (headings, logos)
           mono   — Fira Code (with programming ligatures) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@300..700&family=Zilla+Slab:wght@400;500;700&family=Fira+Code:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <!-- All base16/base24 theme classes (generated from the same scheme
         YAMLs as neevparikh.github.io). One `.<slug> { ... }` block per
         theme, each setting `--color-base16-*` custom properties that the
         Tailwind config below translates into `bg-base16-100` etc. -->
    <link rel="stylesheet" href="themes.css" />

    <!-- FOUC-prevention: apply the user's saved theme class BEFORE the page
         paints. Must run synchronously in <head>, before any styled content
         is rendered. Mirrors the logic in neevparikh.github.io's head.vto. -->
    <script>
      (function () {
        var defaultLight = "base24-softstack-light";
        var defaultDark = "base24-softstack-dark";
        var savedLight = localStorage.getItem("pirouette-theme-light") || defaultLight;
        var savedDark = localStorage.getItem("pirouette-theme-dark") || defaultDark;
        var savedMode = localStorage.getItem("pirouette-theme-mode") || "system";
        var isDark;
        if (savedMode === "system") {
          isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        } else {
          isDark = savedMode === "dark";
        }
        document.documentElement.classList.add(isDark ? savedDark : savedLight);
      })();
    </script>

    <script>
      // Inline Tailwind config with base16 CSS variable colors + font families
      // that match neevparikh.github.io.
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              // The whole UI uses a monospace stack so pirouette feels
              // like pi-cli in a browser. `JetBrainsMono Nerd Font Mono`
              // is the user's local kitty font; the webfont JetBrains
              // Mono (loaded via @import in the CSS below) is the
              // cross-platform fallback. Ligatures (+calt) and slashed
              // zero (+zero) are enabled globally.
              //
              // `font-sans` is the Tailwind default for un-classed text,
              // so pointing it at the mono stack flips the whole UI in
              // one place. `font-mono` is identical; we keep both names
              // for backwards-compat with existing class usage.
              sans: [
                "JetBrainsMono Nerd Font Mono",
                "JetBrainsMono NFM",
                "JetBrains Mono NF",
                "JetBrainsMono Nerd Font",
                "JetBrains Mono",
                "Fira Code",
                "ui-monospace",
                "SFMono-Regular",
                "Menlo",
                "Monaco",
                "Consolas",
                "monospace",
              ],
              // `font-display` keeps a touch of slab-serif identity
              // for the "pirouette" wordmark and a few headline-y
              // labels. Switch it to the mono stack too if you want
              // a fully-uniform look.
              display: [
                "Zilla Slab",
                "Roboto Slab",
                "ui-serif",
                "Georgia",
                "serif",
              ],
              mono: [
                "JetBrainsMono Nerd Font Mono",
                "JetBrainsMono NFM",
                "JetBrains Mono NF",
                "JetBrainsMono Nerd Font",
                "JetBrains Mono",
                "Fira Code",
                "ui-monospace",
                "SFMono-Regular",
                "Menlo",
                "Monaco",
                "Consolas",
                "monospace",
              ],
            },
            colors: {
              // Custom-property-backed colors. Actual values come from the
              // currently-applied `base24-<slug>` class on <html>, defined
              // in themes.css. Bright variants fall back to their normal
              // counterpart when the active scheme is base16 (no brights).
              base16: {
                100: "rgb(var(--color-base16-100))",
                200: "rgb(var(--color-base16-200))",
                300: "rgb(var(--color-base16-300))",
                400: "rgb(var(--color-base16-400))",
                500: "rgb(var(--color-base16-500))",
                600: "rgb(var(--color-base16-600))",
                700: "rgb(var(--color-base16-700))",
                800: "rgb(var(--color-base16-800))",
                red: "rgb(var(--color-base16-red))",
                orange: "rgb(var(--color-base16-orange))",
                yellow: "rgb(var(--color-base16-yellow))",
                green: "rgb(var(--color-base16-green))",
                cyan: "rgb(var(--color-base16-cyan))",
                blue: "rgb(var(--color-base16-blue))",
                purple: "rgb(var(--color-base16-purple))",
                pink: "rgb(var(--color-base16-pink))",
                "red-bright": "rgb(var(--color-base16-red-bright, var(--color-base16-red)))",
                "orange-bright": "rgb(var(--color-base16-orange-bright, var(--color-base16-orange)))",
                "yellow-bright": "rgb(var(--color-base16-yellow-bright, var(--color-base16-yellow)))",
                "green-bright": "rgb(var(--color-base16-green-bright, var(--color-base16-green)))",
                "cyan-bright": "rgb(var(--color-base16-cyan-bright, var(--color-base16-cyan)))",
                "blue-bright": "rgb(var(--color-base16-blue-bright, var(--color-base16-blue)))",
              },
            },
          },
        },
      };
    </script>
    <style>
      /* Theme palettes are loaded from themes.css (generated from base16/24
         scheme YAMLs; see scripts/generate-themes.mjs). The rest of this
         style block is layout/typography that's theme-independent. */

      /* Scrollbar styling */
      * {
        scrollbar-width: thin;
        scrollbar-color: rgb(var(--color-base16-300)) transparent;
      }

      /* Smooth message transitions */
      .message-enter {
        animation: fadeIn 0.15s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Web-font fallback: JetBrains Mono (no Nerd Font glyphs, just
         the core font + ligatures). If the user has `JetBrainsMono Nerd
         Font Mono` installed locally (kitty users, etc.), that wins via
         the font-family stack -- the CDN download is the cross-platform
         fallback.

         display=swap so we don't FOIT on slow connections. */
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400;1,700&display=swap");

      /* Mono stack used everywhere we want the pi-terminal look.
         Lookup order:
           1. JetBrainsMono Nerd Font Mono   -- user's local install (kitty)
           2. JetBrainsMono NF / JetBrains Mono NF / NFM variants
              (different name conventions used by different installers)
           3. JetBrains Mono                 -- webfont (Google CDN)
           4. system mono fallbacks

         +calt enables contextual ligatures (-> => != etc.) and +zero
         enables the slashed zero, matching the kitty config the user
         pasted earlier.

         Defined as a CSS custom property so .md / .md pre / .md code
         all share one source of truth. */
      :root {
        --mono-stack:
          "JetBrainsMono Nerd Font Mono",
          "JetBrainsMono NFM",
          "JetBrains Mono NF",
          "JetBrainsMono Nerd Font",
          "JetBrains Mono",
          "Fira Code",
          ui-monospace,
          SFMono-Regular,
          Menlo,
          Monaco,
          Consolas,
          monospace;
      }

      /* Enable JetBrains Mono ligatures + slashed zero wherever mono is
         used. `calt` is the contextual-alternates feature (-> != >= |>
         etc.); `zero` swaps the round zero for a slashed one so 0/O are
         distinguishable in dense output. */
      pre, code, kbd, samp, .md, .md p, .md li, .md blockquote {
        font-variant-ligatures: contextual;
        font-feature-settings: "calt" 1, "zero" 1;
      }

      /* Markdown rendering rules
       * -------------------------
       * Goal: match pi-coding-agent's TUI markdown look as closely as
       * the browser allows, since pirouette is meant to feel like the
       * pi CLI you're already using.
       *
       *   - Whole transcript is monospace (JetBrains Mono Nerd Font
       *     Mono if installed; webfont JetBrains Mono otherwise).
       *     pi's TUI renders text in a terminal so every char shares a
       *     cell width; we replicate that here, which makes tables /
       *     diffs / aligned blocks render predictably and lets ligatures
       *     (`->`, `!=`, `>=`, `|>`) kick in across the whole UI.
       *   - Headings: bold + yellow, with explicit `### ` prefix on
       *     h3+ (mirrors pi's TUI which always prints the `#` marker
       *     for sub-headings). h1 also underlined.
       *   - Blockquotes: left bar `│` styling, italic, muted color.
       *   - Tables: compact, single-cell-pixel borders that visually
       *     approximate pi-tui's box-drawing (`┌─┬─┐` etc.).
       *   - Code blocks: monospace (inheriting the .md stack), faint bg,
       *     no border (monospace + bg IS the cue, same as pi-tui).
       *   - hljs classes still map to the base16 palette below.
       */
      .md {
        font-family: var(--mono-stack);
        font-size: 0.92em;
        line-height: 1.55;
        /* Wrap long unbreakable strings (URLs, file paths, hashes) so
           they don't push the message bubble past the viewport edge.
           `anywhere` only breaks where it would otherwise overflow, so
           normal prose flow is unaffected. Code blocks (`pre`, `table`)
           opt out below because they have their own `overflow-x: auto`. */
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .md pre, .md pre code, .md table { overflow-wrap: normal; word-break: normal; }

      /* Same wrap behaviour for the user-message and assistant-fallback
         bubbles, which use a plain `<pre class="whitespace-pre-wrap">`
         instead of the markdown renderer. `whitespace-pre-wrap` already
         wraps spaces; this lets us also break unbreakable runs. */
      #messages pre.whitespace-pre-wrap { overflow-wrap: anywhere; word-break: break-word; }
      /* Color palette for markdown elements — matches pi-coding-agent's
       * theme/dark.json semantics: headings yellow, code accent cyan,
       * code blocks green, links blue, list markers accent cyan. Uses
       * base16 tokens so every theme in the picker gets an appropriate
       * mapping automatically. */
      .md > :first-child { margin-top: 0; }
      .md > :last-child { margin-bottom: 0; }
      .md p { margin: 0; }
      .md p + p { margin-top: 0.75rem; }
      /* Headings
         --------
         pi-tui prints `# `, `## `, `### ` literally for h1–h6 (h1 and
         h2 styled bold/underline; h3+ also get the explicit prefix in
         the body text). We replicate via ::before content so the
         visual fidelity matches without modifying the rendered HTML.
         All same size; hierarchy comes from prefix + spacing. */
      .md h1, .md h2, .md h3, .md h4, .md h5, .md h6 {
        margin: 1.1rem 0 0.4rem;
        font-weight: 700;
        font-size: 1em;
        color: rgb(var(--color-base16-yellow));
        font-family: inherit;
      }
      .md h1 { text-decoration: underline; text-underline-offset: 3px; }
      .md h3::before { content: "### "; opacity: 0.6; }
      .md h4::before { content: "#### "; opacity: 0.6; }
      .md h5::before { content: "##### "; opacity: 0.6; }
      .md h6::before { content: "###### "; opacity: 0.6; }
      .md > :is(h1, h2, h3, h4, h5, h6):first-child { margin-top: 0; }
      .md ul, .md ol { margin: 0.5rem 0; padding-left: 1.5rem; }
      .md ul { list-style: disc; }
      .md ol { list-style: decimal; }
      .md li { margin: 0.1rem 0; }
      .md li::marker { color: rgb(var(--color-base16-cyan)); }
      .md li > p { display: inline; }
      .md a {
        color: rgb(var(--color-base16-blue));
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .md strong { font-weight: 700; color: rgb(var(--color-base16-700)); }
      .md em { font-style: italic; }
      .md del { text-decoration: line-through; color: rgb(var(--color-base16-500)); }
      /* Blockquote: pi-tui prefixes every line with `│ ` (in the muted
         quote color) and italicises content. The CSS approximation is
         a 2px left bar in the same color + italic body. Background
         tint helps the bar feel like a continuous block on mobile. */
      .md blockquote {
        border-left: 2px solid rgb(var(--color-base16-cyan));
        padding: 0.25rem 0 0.25rem 0.75rem;
        color: rgb(var(--color-base16-500));
        margin: 0.75rem 0;
        font-style: italic;
        background: rgba(128, 128, 128, 0.06);
      }
      .md blockquote > :first-child { margin-top: 0; }
      .md blockquote > :last-child { margin-bottom: 0; }
      /* Horizontal rule: pi-tui draws `─`*n across the available width.
         A plain 1px border-top is the CSS analogue. */
      .md hr {
        border: none;
        border-top: 1px solid rgb(var(--color-base16-300));
        margin: 0.75rem 0;
      }
      /* Inline code + code blocks: same mono stack as .md (since the
         whole transcript is mono now). Pi-tui paints inline code in
         its accent color (teal-cyan in the dark theme); we keep that. */
      .md code {
        font-family: var(--mono-stack);
        background: rgba(128, 128, 128, 0.18);
        padding: 0.05rem 0.35rem;
        border-radius: 0.25rem;
        font-size: 0.95em;
        color: rgb(var(--color-base16-cyan));
      }
      .md pre {
        font-family: var(--mono-stack);
        background: rgba(128, 128, 128, 0.12);
        border: 0;
        border-radius: 0.4rem;
        padding: 0.5rem 0.75rem;
        margin: 0.75rem 0;
        overflow-x: auto;
        font-size: 0.95em;
        line-height: 1.5;
      }
      /* Code block body: pi paints non-highlighted code with `mdCodeBlock`
         (green in its default dark theme). When hljs tags spans inside
         this element, the `.hljs-*` rules below win. */
      .md pre code {
        display: block;
        background: none;
        padding: 0;
        color: rgb(var(--color-base16-green));
        font-size: inherit;
      }
      /* Tables
         ------
         Mimic pi-tui's box-drawing tables (┌─┬─┐ / ├─┼─┤ / └─┴─┘)
         using CSS borders. Strategy:
           - `border-collapse: collapse` + 1px solid borders on every
             cell gives us the inner grid (the `│` separators between
             columns and the `─` between rows).
           - The outer `<table>` border gives us the frame (┌ / ┐ /
             └ / ┘). Box-drawing chars meet at right angles in pi-tui;
             CSS borders do the same naturally.
           - Header row gets a heavier `border-bottom` (visually = the
             `├─┼─┤` separator pi draws between header and body).
           - Compact padding so tables stay dense like in the terminal.
           - `display: block; overflow-x: auto` keeps wide tables from
             pushing the bubble off-screen on mobile.
         Cell content is mono via the .md cascade. */
      .md table {
        border-collapse: collapse;
        margin: 0.75rem 0;
        width: auto;
        max-width: 100%;
        display: block;
        overflow-x: auto;
        border: 1px solid rgb(var(--color-base16-400));
      }
      .md th, .md td {
        border: 1px solid rgb(var(--color-base16-300));
        padding: 0.2rem 0.55rem;
        text-align: left;
        vertical-align: top;
        font-size: 0.95em;
      }
      .md th {
        background: rgba(128, 128, 128, 0.08);
        font-weight: 700;
        color: rgb(var(--color-base16-700));
        border-bottom: 2px solid rgb(var(--color-base16-400));
      }
      .md img {
        max-width: 100%;
        border-radius: 4px;
        margin: 0.5rem 0;
      }

      /* Pi-terminal markdown rendering
         ------------------------------
         The `.pi-md` block is a single `<pre>` whose inner HTML was
         produced by the browser port of pi-tui's Markdown component
         (src/web/pi-markdown.js). The renderer emits plain text with
         literal box-drawing characters (┌─┬─┐, │, ─, etc.) for tables,
         blockquotes, hrs, and per-line prefixes -- the way pi-cli
         draws them in a terminal. This block just colors the inline
         `<span class="pi-*">` markers that the renderer interleaves.

         A `<pre>` with `white-space: pre` preserves all those characters
         verbatim. We DO NOT use `pre-wrap` -- the renderer already
         wrapped at the right column width; letting the browser wrap
         too would double-wrap and misalign the box-drawing. The
         outer container handles overflow via `overflow-x: auto` on
         the bubble so a too-narrow viewport falls back to horizontal
         scroll instead of breaking the layout. */
      .pi-md {
        font-family: var(--mono-stack);
        font-size: 0.92em;
        line-height: 1.45;
        white-space: pre;
        margin: 0;
        background: none;
        padding: 0;
        color: rgb(var(--color-base16-600));
        overflow-x: auto;
      }
      .pi-md a { color: inherit; text-decoration: none; }
      /* Inline styles. Names mirror pi-tui's theme-color slot names. */
      .pi-strong { font-weight: 700; color: rgb(var(--color-base16-700)); }
      .pi-em     { font-style: italic; }
      .pi-del    { text-decoration: line-through; color: rgb(var(--color-base16-500)); }
      .pi-code   { color: rgb(var(--color-base16-cyan)); }
      .pi-link, .pi-link a { color: rgb(var(--color-base16-blue)); text-decoration: underline; text-underline-offset: 2px; }
      .pi-link-url { color: rgb(var(--color-base16-500)); }
      /* Headings: yellow + bold across all levels, h1/h2 also underlined.
         h3+ get the `### ` prefix as a literal text run from the
         renderer (not a ::before pseudo-element), so we don't need any
         pseudo-element CSS here. */
      .pi-heading { color: rgb(var(--color-base16-yellow)); font-weight: 700; }
      .pi-h1 { text-decoration: underline; text-underline-offset: 3px; }
      .pi-h2 { text-decoration: underline; text-underline-offset: 3px; }
      /* List bullets: cyan to match pi-tui's `listBullet`. */
      .pi-list-bullet { color: rgb(var(--color-base16-cyan)); }
      /* Blockquote: the `│ ` bar in cyan + italic muted body. */
      .pi-quote-bar { color: rgb(var(--color-base16-cyan)); }
      .pi-quote { color: rgb(var(--color-base16-500)); font-style: italic; }
      /* Horizontal rule: muted gray bar. */
      .pi-hr { color: rgb(var(--color-base16-400)); }
      /* Table box-drawing characters: muted accent. Header cells bold. */
      .pi-table-border { color: rgb(var(--color-base16-400)); }
      .pi-th { font-weight: 700; color: rgb(var(--color-base16-700)); }
      /* Code blocks: faint background, green text (matches pi-tui's
         `mdCodeBlock`). hljs spans inside still win their own colors
         from the `.hljs-*` rules below.
         The background applies only to the text spans (not the
         padding/indent) so that "  " prefix at the start of each
         code line doesn't get a wash of background bleeding into the
         left margin. */
      .pi-code-fence { color: rgb(var(--color-base16-400)); }
      .pi-codeblock { color: rgb(var(--color-base16-green)); }
      .pi-md .pi-codeblock,
      .pi-md .pi-codeblock * {
        /* hljs output sits inside .pi-codeblock; let its own colors win
           by overriding the default green only on the parent. */
      }
      /* Inline image-reference placeholder (rare; usually we already
         render thumbnails separately). */
      .pi-image-ref { color: rgb(var(--color-base16-500)); font-style: italic; }

      /* Flat pi-cli transcript rows
         ---------------------------
         User and assistant messages live in the same vertical flow --
         no left/right alignment, no rounded bubble. The whole row
         spans the message column; horizontal padding pulls content
         away from the edge. User rows get a subtle bg tint so you
         can scan the transcript and spot your own utterances (CSS
         analogue of pi-tui's input-recall band).

         Why no `space-y-*` between rows: pi-cli renders a continuous
         terminal-style transcript where adjacent messages butt up
         directly. The `pi-row` `py-*` provides intra-row spacing;
         the bg-tint contrast makes the boundary readable. */
      .pi-row {
        /* Anchored content can scroll horizontally inside the row
           (pi-md tables on a narrow viewport) without breaking the
           outer column. */
        min-width: 0;
      }
      .pi-row + .pi-row {
        /* Subtle separator -- 1px hairline in the surrounding gray.
           Same trick a terminal would use to break up scrollback. */
        border-top: 1px solid rgba(128, 128, 128, 0.08);
      }
      .pi-row-user {
        background: rgba(128, 128, 128, 0.06);
      }
      .pi-row-user pre {
        color: rgb(var(--color-base16-700));
      }
      .pi-row-assistant {
        /* No bg-tint: assistant content uses the default page bg.
           Inherits color from the parent (.pi-md, .md, or the
           rawAssistant <pre>) so we don't need to repeat it here. */
      }

      /* Syntax highlighting — base16-mapped hljs classes, following the
       * same palette conventions as neevparikh.github.io's Shiki setup.
       * Bright variants fall back to their normal counterpart on base16
       * schemes where no brights are defined. */
      .md pre code.hljs { background: transparent; color: rgb(var(--color-base16-700)); padding: 0; }
      .hljs-comment, .hljs-quote { color: rgb(var(--color-base16-500)); font-style: italic; }
      .hljs-keyword, .hljs-selector-tag { color: rgb(var(--color-base16-red-bright, var(--color-base16-red))); }
      .hljs-number, .hljs-literal, .hljs-deletion { color: rgb(var(--color-base16-purple)); }
      .hljs-string, .hljs-doctag, .hljs-addition, .hljs-regexp, .hljs-attribute { color: rgb(var(--color-base16-green-bright, var(--color-base16-green))); }
      .hljs-function, .hljs-title, .hljs-title.function_, .hljs-section, .hljs-name { color: rgb(var(--color-base16-yellow-bright, var(--color-base16-yellow))); }
      .hljs-type, .hljs-title.class_, .hljs-built_in, .hljs-class { color: rgb(var(--color-base16-cyan-bright, var(--color-base16-cyan))); }
      .hljs-attr, .hljs-variable, .hljs-variable.language_, .hljs-params, .hljs-property, .hljs-template-variable { color: rgb(var(--color-base16-blue-bright, var(--color-base16-blue))); }
      .hljs-meta, .hljs-meta .hljs-keyword, .hljs-meta .hljs-string { color: rgb(var(--color-base16-orange)); }
      .hljs-operator { color: rgb(var(--color-base16-600)); }
      .hljs-punctuation { color: rgb(var(--color-base16-600)); }
      .hljs-subst { color: rgb(var(--color-base16-700)); }
      .hljs-symbol, .hljs-bullet, .hljs-link { color: rgb(var(--color-base16-cyan)); }
      .hljs-emphasis { font-style: italic; }
      .hljs-strong { font-weight: bold; }

      /* Diff rendering */
      .diff-line { display: block; padding: 0 0.5rem; }
      .diff-add { background: rgba(var(--color-base16-green), 0.15); color: rgb(var(--color-base16-green)); }
      .diff-del { background: rgba(var(--color-base16-red), 0.15); color: rgb(var(--color-base16-red)); }
      .diff-ctx { color: rgb(var(--color-base16-500)); }

      /* Running indicator */
      @keyframes pulse-dot {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      .pulse-dot {
        animation: pulse-dot 1.5s ease-in-out infinite;
      }
    </style>
  </head>
  <body class="flex h-dvh bg-base16-100 text-base16-700 font-sans text-sm overflow-hidden">

    <!-- Mobile sidebar backdrop. Click to close the drawer.
         `md:hidden` so it never appears at desktop sizes (the sidebar is
         a real flex child there, not an overlay). -->
    <div
      id="sidebar-backdrop"
      class="hidden fixed inset-0 bg-black/50 z-30 md:hidden"
      aria-hidden="true"
    ></div>

    <!-- Sidebar.
         Below `md`: off-canvas drawer (fixed position, slides in from
         the left, max-width clamps so it never quite hits the screen edge).
         At `md` and up: a regular flex child of the body.
         The transition rule applies in both modes but only animates a
         transform change, which only happens on mobile. -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 max-w-[85vw] -translate-x-full transition-transform duration-200 ease-out flex-none flex flex-col bg-base16-200 border-r border-base16-300 md:relative md:translate-x-0 md:w-64 md:max-w-none md:transition-none">
      <!-- Header -->
      <!-- Sidebar header. Fixed `h-[88px]` at md+ matches the main
           panel's agent-header so the sidebar top + main top line up
           regardless of how many lines the agent-header currently shows
           (name / info / live stats). Bump this in lockstep with the main
           header if its content grows.
           On mobile the agent-header is auto-height, so the sidebar
           header just uses its natural height too. -->
      <div class="min-h-[56px] md:h-[88px] px-4 py-3 border-b border-base16-300 flex items-center justify-between gap-2">
        <h1 class="text-xl font-bold text-base16-600 font-display">pirouette</h1>

        <div class="flex gap-1.5 flex-none">
        <!-- Browser-notification toggle. Click to request permission +
             toggle. When enabled, an agent finishing its turn (transition
             to `waiting_input`) fires a `Notification` if the dashboard
             tab isn't currently visible-and-focused. Uses the standard
             Notification API — fires only while the tab is open (foreground
             or background). For "notify even when the tab is closed" you
             want Web Push, which is a bigger build-out. -->
        <button
          id="notify-btn"
          class="text-xs px-2 py-1 rounded bg-base16-300/40 text-base16-500 hover:bg-base16-300/70 cursor-pointer font-mono"
          title="Notify when an agent finishes its turn (only fires while this tab is open)"
        >
          notify
        </button>

        <!-- Theme picker. Ported from neevparikh.github.io: clicking `theme`
             opens a search + list panel; scheme buttons flip the active
             light/dark slot and persist to localStorage. "system dark mode"
             resets to following the OS preference.
             Styled as a pill matching the agent-header action buttons
             (stop/resume/delete/raw) for visual consistency across headers. -->
        <div class="relative">
          <button
            id="theme-btn"
            class="text-xs px-2 py-1 rounded bg-base16-300/40 text-base16-500 hover:bg-base16-300/70 cursor-pointer font-mono"
            title="Change theme"
          >
            theme
          </button>
          <div
            id="theme-picker"
            class="hidden absolute left-0 top-full mt-2 w-64 max-w-[calc(100vw-2rem)] bg-base16-100 border border-base16-300 rounded-lg shadow-lg z-50 max-h-80 overflow-hidden flex flex-col"
          >
            <input
              id="theme-search"
              type="text"
              placeholder="search themes…"
              class="w-full px-3 py-2 text-sm bg-base16-200 border-b border-base16-300 text-base16-700 placeholder-base16-500/50 outline-none font-sans"
            />
            <button
              id="theme-reset"
              class="w-full px-3 py-1.5 text-left text-sm hover:bg-base16-200 text-base16-500 border-b border-base16-300 cursor-pointer font-sans"
            >
              system dark mode
            </button>
            <div id="theme-list" class="overflow-y-auto flex-1"></div>
          </div>
        </div>
        </div>
      </div>

      <!-- Agent list (grouped by project). Font sizes: project names at
           `text-sm`, project subtitles + agent sublines at `text-xs`. Bumped
           one step from the original `text-xs` / `text-[10px]` after the
           sidebar felt too dense. -->
      <div class="flex-1 overflow-y-auto" id="agent-list">
        <div class="p-4 text-base16-500 text-sm italic">loading…</div>
      </div>

      <!-- Footer: new-project button (agents are created via the input bar) -->
      <div class="flex-none px-3 py-3 border-t border-base16-300">
        <button
          id="new-project-btn"
          class="w-full py-2 px-3 rounded-lg border border-transparent bg-base16-300 text-base16-600 hover:bg-base16-400/30 cursor-pointer text-sm"
        >
          + new project
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 flex flex-col min-w-0">

      <!-- Agent header.
           md+: fixed `h-[88px]` (worst-case height of three content lines
           at our current font sizes; matches the sidebar header), with
           `items-start` so multi-line agent info top-aligns with the
           pills.
           Below md: auto-height; we hide the multi-line info strip and
           live-stats so the left side is just the agent name (one line),
           which we vertically center against the action pills with
           `items-center`. Top-align there would leave the agent-name's
           Zilla Slab text at one Y and the pill-text baselines at
           another, which reads as misalignment. -->
      <!-- On mobile (<md), allow the action-button cluster to wrap to a
           second row. With six visible pills (raw/model/thinking/fork/
           stop/delete) plus the agent name and hamburger, the row
           overflows the viewport on a 375px-wide phone -- 'delete'
           visibly clips on the right edge. `flex-wrap` lets the
           buttons drop below the name when they can't fit, with
           `md:flex-nowrap` restoring the single-row desktop layout
           (which has plenty of horizontal real estate). -->
      <header id="agent-header" class="flex-none md:h-[88px] px-3 md:px-6 py-2 md:py-3 border-b border-base16-300 bg-base16-200/50 flex flex-wrap md:flex-nowrap items-center md:items-start justify-between gap-2 md:gap-4">
        <button
          id="sidebar-toggle"
          class="md:hidden flex-none px-2 py-1 rounded text-base16-500 hover:text-base16-700 hover:bg-base16-300/40 cursor-pointer text-base"
          aria-label="open sidebar"
          title="agents"
        >☰</button>
        <div class="min-w-0 flex-1">
          <div class="flex items-baseline gap-2">
            <span id="agent-name" class="text-base16-600 font-bold font-display">select an agent</span>
            <span id="agent-status" class="text-xs text-base16-500 truncate"></span>
          </div>
          <div id="agent-info" class="text-[10px] text-base16-500 mt-1 font-mono truncate hidden md:block"></div>
          <!-- Live footer: tokens / context / cost / thinking. Populated by
               fetchStats() whenever the agent state changes or an agent is
               selected. Same data pi's TUI footer shows.
               Hidden on mobile to keep the header compact — you can still
               see the data on desktop or via the agent's own session. -->
          <div id="agent-stats" class="text-[10px] text-base16-500 mt-0.5 font-mono truncate hidden md:block"></div>
        </div>
        <div class="flex gap-1 md:gap-2 flex-none flex-wrap justify-end">
          <!-- Global raw-view toggle. Off = rendered markdown (default).
               On = every assistant message shows its plain markdown source.
               Preference is persisted in localStorage and applies to every
               agent. Active state uses the base16-blue accent. -->
          <button id="agent-raw-btn" class="text-xs px-2 py-1 rounded bg-base16-300/40 text-base16-500 hover:bg-base16-300/70 cursor-pointer font-mono" title="Toggle raw markdown view (applies to all assistant messages)">raw</button>

          <!-- Model picker. Click to open a search + list popup of every
               provider/model the registry knows about. Switching mid-turn
               persists on the agent config + reconfigures the live session
               via pi's `setModel()`. -->
          <div class="relative">
            <button id="agent-model-btn" class="text-xs px-2 py-1 rounded bg-base16-300/40 text-base16-500 hover:bg-base16-300/70 cursor-pointer font-mono whitespace-nowrap" title="Switch model for this agent">model ▾</button>
            <div
              id="model-picker"
              class="hidden absolute right-0 top-full mt-2 w-80 max-w-[calc(100vw-1.5rem)] bg-base16-100 border border-base16-300 rounded-lg shadow-lg z-50 max-h-96 overflow-hidden flex flex-col"
            >
              <input
                id="model-search"
                type="text"
                placeholder="search models…"
                class="w-full px-3 py-2 text-sm bg-base16-200 border-b border-base16-300 text-base16-700 placeholder-base16-500/50 outline-none font-mono"
              />
              <div id="model-list" class="overflow-y-auto flex-1"></div>
            </div>
          </div>

          <!-- Thinking-level picker. Mirror of the model picker but with a
               fixed five-option list (off / minimal / low / medium / high).
               Only meaningful on reasoning-capable models; pi silently
               ignores the setting on non-reasoning models. Persists on the
               agent config and reconfigures the live session via pi's
               `setThinkingLevel()`. -->
          <div class="relative">
            <button id="agent-thinking-btn" class="text-xs px-2 py-1 rounded bg-base16-300/40 text-base16-500 hover:bg-base16-300/70 cursor-pointer font-mono whitespace-nowrap" title="Set reasoning effort for this agent">thinking ▾</button>
            <div
              id="thinking-picker"
              class="hidden absolute right-0 top-full mt-2 w-44 bg-base16-100 border border-base16-300 rounded-lg shadow-lg z-50 overflow-hidden flex flex-col"
            >
              <div id="thinking-list" class="overflow-y-auto"></div>
            </div>
          </div>

          <!-- Fork: spawn a new agent with a copy of this one's session.
               Click to fork at HEAD. To fork from a specific message, hover
               a user message in the transcript and click its ⋉ button. -->
          <button id="agent-fork-btn" class="text-xs px-2 py-1 rounded bg-base16-purple/20 text-base16-purple hover:bg-base16-purple/30 cursor-pointer" title="Fork this agent: spawn a new agent with a copy of the session">fork</button>
          <button id="agent-stop-btn" class="hidden text-xs px-2 py-1 rounded bg-base16-yellow/20 text-base16-yellow hover:bg-base16-yellow/30 cursor-pointer">stop</button>
          <button id="agent-resume-btn" class="hidden text-xs px-2 py-1 rounded bg-base16-green/20 text-base16-green hover:bg-base16-green/30 cursor-pointer">resume</button>
          <button id="agent-delete-btn" class="hidden text-xs px-2 py-1 rounded bg-base16-red/20 text-base16-red hover:bg-base16-red/30 cursor-pointer" title="Remove this agent (stops it and deletes its state). Hold Shift to also delete worktree + sessions.">delete</button>
        </div>
      </header>

      <!-- Messages -->
      <!-- Flat pi-cli transcript: no `space-y-*` between rows so user/
           assistant rows abut directly (matches the continuous terminal
           feel of pi-cli). Padding moves to per-row `pi-row` CSS so
           the bg-tint strips run the full container width. -->
      <div id="messages" class="flex-1 overflow-y-auto px-0 py-2">
        <div class="text-base16-500 text-xs italic text-center mt-8">
          select an agent from the sidebar or create a new one
        </div>
      </div>

      <!-- Input bar (with @mention autocomplete).
           pb safe-area on iOS so the textarea doesn't sit underneath the
           home-indicator bar at the screen bottom. -->
      <div id="input-bar" class="flex-none px-3 md:px-6 pt-2 md:pt-3 pb-[max(0.375rem,env(safe-area-inset-bottom))] border-t border-base16-300 bg-base16-200/30 relative">
        <!-- Autocomplete popup: absolute, anchored to the top of the input
             bar so it floats above the textarea. Shown only while typing @. -->
        <div
          id="mention-popup"
          class="hidden absolute bottom-full left-3 right-3 md:left-6 md:right-6 mb-1 bg-base16-200 border border-base16-300 rounded-lg shadow-lg max-h-56 overflow-y-auto z-10"
        ></div>

        <!-- Slash-command popup. Mirrors the mention popup; shown when the
             input starts with `/`. Lists pirouette's client/server commands
             plus discovered `/skill:<name>` entries from /api/skills. The
             two popups are mutually exclusive (the `^/` and `^@` regexes
             are disjoint), so they share the same anchor without colliding. -->
        <div
          id="slash-popup"
          class="hidden absolute bottom-full left-3 right-3 md:left-6 md:right-6 mb-1 bg-base16-200 border border-base16-300 rounded-lg shadow-lg max-h-72 overflow-y-auto z-10"
        ></div>

        <!-- Queue chips. Populated by app.js when the agent has pending
             steering or follow-up messages (mirroring pi's TUI). Stays
             above the textarea so the user can see what they've already
             queued and avoid re-sending. -->
        <div id="queue-strip" class="hidden mb-2 flex flex-wrap gap-1.5"></div>

        <!-- Image-attachment preview strip. Populated by app.js when the
             user pastes an image into the input. Each pill shows a small
             thumbnail of the attached image and a remove (×) button.
             Cleared when the message is sent. -->
        <div id="attachment-strip" class="hidden mb-2 flex flex-wrap gap-2"></div>

        <div class="flex items-stretch gap-2">
          <textarea
            id="message-input"
            class="flex-1 bg-base16-200 text-base16-700 border border-base16-300 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:border-base16-blue placeholder-base16-500"
            placeholder="@name your message — or select an agent"
            rows="1"
          ></textarea>
          <!-- Send button doubles as a steer / follow-up chooser when the
               agent is currently streaming. Default "steer" (interrupt)
               matches pi's TUI default. -->
          <div class="flex flex-col gap-0.5">
            <button
              id="send-btn"
              class="px-4 py-2 rounded-lg border border-transparent bg-base16-blue/20 text-base16-blue hover:bg-base16-blue/30 cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed text-sm whitespace-nowrap"
            >
              send
            </button>
            <button
              id="send-mode-btn"
              class="hidden text-[10px] px-1 py-0.5 rounded text-base16-500 hover:text-base16-600 cursor-pointer font-mono whitespace-nowrap"
              title="Click to switch between steer (interrupt) and follow-up (queue)"
            >mode: steer</button>
          </div>
        </div>

        <!-- Status strip below the input. Shows vim mode, pending operator,
             and a small toggle. Hidden text-only when vim is off so the
             input bar stays compact. -->
        <div class="flex items-center justify-between mt-1 text-[10px] font-mono">
          <div id="vim-mode-label" class="text-base16-500">
            <!-- populated by VimMode.onModeChange — e.g. "-- NORMAL [2d] --" -->
          </div>
          <button
            id="vim-toggle-btn"
            class="px-1.5 py-0.5 rounded text-[10px] font-mono cursor-pointer text-base16-500 hover:text-base16-700"
            title="Toggle vim modal editing (persists)"
          >vim: off</button>
        </div>
      </div>
    </main>

    <!-- New-project modal -->
    <div id="new-project-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
      <div class="bg-base16-200 border border-base16-300 rounded-xl p-6 w-full max-w-sm md:w-96 shadow-xl">
        <h2 class="text-base16-600 font-bold mb-4">new project</h2>
        <label class="block text-xs text-base16-500 mb-1">name</label>
        <input
          id="proj-modal-name"
          class="w-full bg-base16-100 text-base16-700 border border-base16-300 rounded-lg px-3 py-2 text-sm mb-3 focus:outline-none focus:border-base16-blue"
          placeholder="my-project"
        />
        <label class="block text-xs text-base16-500 mb-1">repo url (optional)</label>
        <input
          id="proj-modal-repo"
          class="w-full bg-base16-100 text-base16-700 border border-base16-300 rounded-lg px-3 py-2 text-sm mb-1 focus:outline-none focus:border-base16-blue"
          placeholder="https://github.com/user/repo"
        />
        <p class="text-[10px] text-base16-500 mb-4">
          Leave empty for a bare workspace (git-init'd). Agents in this project share this repo; each gets its own worktree + branch.
        </p>
        <div class="flex gap-2 justify-end">
          <button id="proj-modal-cancel" class="px-4 py-2 rounded-lg text-base16-500 hover:text-base16-600 cursor-pointer text-sm">cancel</button>
          <button id="proj-modal-create" class="px-4 py-2 rounded-lg bg-base16-green/20 text-base16-green hover:bg-base16-green/30 cursor-pointer text-sm">create</button>
        </div>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
