# Pirouette default configuration.
#
# Layering (later wins):
#   built-in defaults  <  ./pirouette.toml (this file)  <  ~/.pirouette/config.toml
#
# This file ships with the package and contains generic defaults only. Put
# your hosts and per-user values in `~/.pirouette/config.toml` (not in the
# repo). Run `pru config show` to see the effective merged config.
#
# Pirouette manages one or more SSH-reachable hosts you already own (a METR
# devpod, a long-running VM, a dev container, ...). Describe each under
# `[hosts.<name>]`; commands target one host at a time via the global
# `--host <name>` flag (falling back to `default_host`, or the sole host if
# only one is defined).
#
# A minimal ~/.pirouette/config.toml:
#
#   default_host = "gpu"
#
#   [defaults]
#   npm_package   = "@neevparikh/pirouette@latest"
#   default_model = "anthropic/claude-sonnet-4-5"
#
#   [hosts.gpu]
#   ssh_alias       = "gpu"          # entry in ~/.ssh/config
#   user            = "you"          # SSH login user
#   persistent_root = "/data"        # mount-point of your persistent volume
#   public_url      = "https://pirouette-gpu.<tailnet>.ts.net"   # optional
#
#   [hosts.gpu.tailscale]
#   enabled  = true                  # bridge the dashboard onto your tailnet
#   hostname = "pirouette-gpu"
#
# The remote host needs: node, npm, git, tmux, an SSH server, a non-root
# sudo-able user, and (recommended) yadm for dotfiles.

# Host targeted when --host isn't passed. Empty => use the sole host if
# exactly one is defined, else error asking for --host.
default_host = ""

[defaults]
# npm package `pirouette server` is installed from on first setup. Override
# with your fork's scope if you publish your own build.
npm_package = "@neevparikh/pirouette@latest"
# Default model used when `pru launch` / the web UI don't specify one. Must be
# a model string your credentials can actually reach
# (e.g. "anthropic/claude-sonnet-4-5", "hawk/claude-opus-4-7").
default_model = ""
# Default thinking level for new agents when none is specified. Empty = off.
# Options: off | minimal | low | medium | high.
default_thinking_level = ""
# Port the pirouette server binds on the host.
port = 7777
# Address the server binds on the host. 127.0.0.1 (reach via SSH tunnel) is
# the safe default. Set "0.0.0.0" per-host when something in front of the
# loopback bind needs to reach it (a docker `-p` mapping, a host-level
# `tailscale serve`, ...).
bind_host = "127.0.0.1"

[defaults.dotfiles]
# Optional. If set, `pru setup` runs `yadm clone <url>` on the host on first
# setup. SSH-form URLs work if your ssh-agent is forwarded to the host. Leave
# empty to skip. Override per host under [hosts.<name>.dotfiles].
clone_url = ""
# Optional. URL returning an SSH authorized_keys file (e.g. GitHub's
# `/<user>.keys`). Curled into ~/.ssh/authorized_keys on the host. Empty=skip.
authorized_keys_url = ""

# ---- Per-host blocks live in ~/.pirouette/config.toml, e.g.: ----
#
# [hosts.gpu]
# ssh_alias       = "gpu"
# user            = "you"
# persistent_root = "/data"
# # data_dir      = ""        # optional; default ${persistent_root}/pirouette/data
# # home_dir      = ""        # optional; default ${persistent_root}/home/${user}
# # bind_host     = "0.0.0.0" # optional; overrides [defaults].bind_host
# # adopt         = true      # optional; skip the home-migration on setup
# #                           #   (for hosts already laid out as you want them,
# #                           #    e.g. a container with a bind-mounted $HOME)
# # public_url    = "https://pirouette-gpu.<tailnet>.ts.net"
# # allowed_hosts = ["pirouette-gpu", "pirouette-gpu.<tailnet>.ts.net"]
#
# [hosts.gpu.tailscale]
# enabled          = true
# hostname         = "pirouette-gpu"
# state_persistent = true
